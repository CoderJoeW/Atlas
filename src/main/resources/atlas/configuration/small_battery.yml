items:
  atlas:small_battery:
    material: paper
    data:
      item-name: "<!i><gradient:#FFD700:#FF6347>Small Battery"
    model: minecraft:block/custom/small_battery
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 4.0
          resistance: 4.0
          is-suffocating: true
          is-redstone-conductor: false
          push-reaction: push_only
          tags: ["minecraft:mineable/pickaxe"]
          sounds:
            break: minecraft:block.metal.break
            step: minecraft:block.metal.step
            place: minecraft:block.metal.place
            hit: minecraft:block.metal.hit
            fall: minecraft:block.metal.fall
        state:
          auto-state: solid
          model:
            path: minecraft:block/custom/small_battery
            generation:
              parent: minecraft:block/cube_bottom_top
              textures:
                top: minecraft:block/custom/small_battery
                bottom: minecraft:block/custom/small_battery_bottom
                side: minecraft:block/custom/small_battery_side

