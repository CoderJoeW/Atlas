items:
  atlas:fluid_pump:
    material: paper
    data:
      item-name: "<!i><gradient:#00CED1:#1E90FF>Fluid Pump"
    model: minecraft:block/custom/fluid_pump
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 4.0
          resistance: 4.0
          is-suffocating: true
          is-redstone-conductor: false
          push-reaction: push_only
          tags: ["minecraft:mineable/pickaxe"]
          sounds:
            break: minecraft:block.metal.break
            step: minecraft:block.metal.step
            place: minecraft:block.metal.place
            hit: minecraft:block.metal.hit
            fall: minecraft:block.metal.fall
        state:
          auto-state: solid
          model:
            path: minecraft:block/custom/fluid_pump
            generation:
              parent: minecraft:block/cube_bottom_top
              textures:
                top: minecraft:block/custom/fluid_pump_top
                bottom: minecraft:block/custom/fluid_pump_bottom
                side: minecraft:block/custom/fluid_pump_side

