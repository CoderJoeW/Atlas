items:
  atlas:auto_smelter:
    material: paper
    data:
      item-name: "<!i><gradient:#FF4500:#FFD700>Auto Smelter"
    model: minecraft:block/custom/auto_smelter
    behavior:
      type: block_item
      block:
        loot:
          template: default:loot_table/self
        settings:
          hardness: 4.0
          resistance: 4.0
          is-suffocating: false
          is-view-blocking: false
          is-redstone-conductor: false
          can-occlude: false
          push-reaction: push_only
          tags: ["minecraft:mineable/pickaxe"]
          sounds:
            break: minecraft:block.metal.break
            step: minecraft:block.metal.step
            place: minecraft:block.metal.place
            hit: minecraft:block.metal.hit
            fall: minecraft:block.metal.fall
        states:
          properties:
            facing:
              type: horizontal_direction
              default: north
            powered:
              type: boolean
              default: false
          appearances:
            idle:
              auto-state: leaves
              model:
                path: minecraft:block/custom/auto_smelter
                generation:
                  parent: minecraft:block/cube
                  textures:
                    north: minecraft:block/custom/auto_smelter_idle_north
                    south: minecraft:block/custom/auto_smelter_idle_south
                    east: minecraft:block/custom/auto_smelter_idle_east
                    west: minecraft:block/custom/auto_smelter_idle_west
                    up: minecraft:block/custom/auto_smelter_idle_up
                    down: minecraft:block/custom/auto_smelter_idle_down
            active:
              auto-state: leaves
              model:
                path: minecraft:block/custom/auto_smelter_active
                generation:
                  parent: minecraft:block/cube
                  textures:
                    north: minecraft:block/custom/auto_smelter_active_north
                    south: minecraft:block/custom/auto_smelter_active_south
                    east: minecraft:block/custom/auto_smelter_active_east
                    west: minecraft:block/custom/auto_smelter_active_west
                    up: minecraft:block/custom/auto_smelter_active_up
                    down: minecraft:block/custom/auto_smelter_active_down
          variants:
            facing=north,powered=false:
              appearance: idle
            facing=south,powered=false:
              appearance: idle
            facing=east,powered=false:
              appearance: idle
            facing=west,powered=false:
              appearance: idle
            facing=north,powered=true:
              appearance: active
            facing=south,powered=true:
              appearance: active
            facing=east,powered=true:
              appearance: active
            facing=west,powered=true:
              appearance: active

recipes:
  atlas:auto_smelter:
    type: shapeless
    category: misc
    unlock-on-ingredient-obtained: true
    ingredients:
      - minecraft:iron_ingot
      - minecraft:iron_ingot
      - minecraft:iron_ingot
      - minecraft:redstone
      - minecraft:redstone
      - minecraft:redstone
      - minecraft:furnace
    result:
      id: atlas:auto_smelter
      count: 1
