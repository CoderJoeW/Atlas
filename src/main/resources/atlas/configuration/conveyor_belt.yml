                    north: minecraft:block/custom/conveyor_belt_side
                    south: minecraft:block/custom/conveyor_belt_side
                    east: minecraft:block/custom/conveyor_belt_back
                    west: minecraft:block/custom/conveyor_belt_front
                    up: minecraft:block/custom/conveyor_belt_top_west
                    down: minecraft:block/custom/conveyor_belt_bottom
