          properties:
            facing:
              type: horizontal_direction
              default: north
          appearances:
            north:
              auto-state: solid
              model:
                path: minecraft:block/custom/conveyor_belt
                generation:
                  parent: minecraft:block/custom/conveyor_belt_base
                  textures:
                    north: minecraft:block/custom/conveyor_belt_front
                    south: minecraft:block/custom/conveyor_belt_back
                    east: minecraft:block/custom/conveyor_belt_side
                    west: minecraft:block/custom/conveyor_belt_side
                    up: minecraft:block/custom/conveyor_belt_top_north
                    down: minecraft:block/custom/conveyor_belt_bottom
            south:
              auto-state: solid
              model:
                path: minecraft:block/custom/conveyor_belt_south
                generation:
                  parent: minecraft:block/custom/conveyor_belt_base
                  textures:
                    north: minecraft:block/custom/conveyor_belt_back
                    south: minecraft:block/custom/conveyor_belt_front
                    east: minecraft:block/custom/conveyor_belt_side
                    west: minecraft:block/custom/conveyor_belt_side
                    up: minecraft:block/custom/conveyor_belt_top_south
                    down: minecraft:block/custom/conveyor_belt_bottom
            east:
              auto-state: solid
              model:
                path: minecraft:block/custom/conveyor_belt_east
                generation:
                  parent: minecraft:block/custom/conveyor_belt_base
                  textures:
                    north: minecraft:block/custom/conveyor_belt_side
                    south: minecraft:block/custom/conveyor_belt_side
                    east: minecraft:block/custom/conveyor_belt_front
                    west: minecraft:block/custom/conveyor_belt_back
                    up: minecraft:block/custom/conveyor_belt_top_east
                    down: minecraft:block/custom/conveyor_belt_bottom
