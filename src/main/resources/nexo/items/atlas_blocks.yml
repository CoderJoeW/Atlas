# Atlas Custom Blocks Configuration
# These items are loaded by Nexo to create custom blocks

power_cable:
  itemname: "<gradient:#FFD700:#FF4500>Power Cable"
  material: paper
  Pack:
    generate_model: true
    parent_model: block/cube_all
    textures:
      all: atlas:block/power_cable_side_up
  Mechanics:
    custom_block:
      type: NOTEBLOCK
      custom_variation: 101
      hardness: 2
      block_sounds:
        break_sound: block.metal.break
        place_sound: block.metal.place
        hit_sound: block.metal.hit
        step_sound: block.metal.step
        fall_sound: block.metal.fall
      drop:
        silktouch: false
        loots:
          - nexo_item: power_cable
            probability: 1.0

