# Atlas Custom Blocks Configuration
# These items are loaded by Nexo to create custom blocks

small_solar_panel:
  itemname: "<gradient:#1E90FF:#FFD700>Small Solar Panel"
  material: paper
  Pack:
    generate_model: true
    parent_model: block/cube_bottom_top
    textures:
      top: atlas:block/small_solar_panel
  Mechanics:
    custom_block:
      type: NOTEBLOCK
      custom_variation: 100
      hardness: 4
      block_sounds:
        break_sound: block.metal.break
        place_sound: block.metal.place
        hit_sound: block.metal.hit
        step_sound: block.metal.step
        fall_sound: block.metal.fall
      drop:
        silktouch: false
        loots:
          - nexo_item: small_solar_panel
            probability: 1.0
